name: Deploy to Play

# Builds a signed AAB and uploads it to Google Play via Gradle Play Publisher.
# Triggers on a v* tag (auto) or manually with a chosen track.
#
# Required repository secrets:
#   KEYSTORE_BASE64             base64 of the upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD   keystore password
#   ANDROID_KEY_ALIAS           key alias
#   ANDROID_KEY_PASSWORD        key password
#   PLAY_SERVICE_ACCOUNT_JSON   full JSON of a Play Console service account
#                               with "Release to testing tracks" permission
#
# One-time prerequisite: the app must already exist on Play with one manual
# release (Google requires the very first upload via the Console).

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to publish to"
        type: choice
        default: internal
        options: [internal, alpha, beta, production]
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/upload-keystore.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_PUBLISHER_CREDENTIALS: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
      TRACK: ${{ github.event.inputs.track || 'internal' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight — verify required secrets are present
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          missing=0
          [ -z "$KEYSTORE_BASE64" ] && echo "::error::Missing secret KEYSTORE_BASE64" && missing=1
          [ -z "$ANDROID_PUBLISHER_CREDENTIALS" ] && echo "::error::Missing secret PLAY_SERVICE_ACCOUNT_JSON" && missing=1
          [ "$missing" = "1" ] && exit 1 || echo "Secrets present."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$ANDROID_KEYSTORE_FILE"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Publish App Bundle to ${{ env.TRACK }}
        run: ./gradlew :app:publishReleaseBundle --track "$TRACK"
