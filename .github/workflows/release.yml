name: Release AAB

# Produces a Play-ready Android App Bundle (.aab).
# Trigger manually (Actions tab → Run workflow) or by pushing a v* tag.
#
# To get an UPLOADABLE (signed) bundle, add these repository secrets:
#   KEYSTORE_BASE64            base64 of your upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD  keystore password
#   ANDROID_KEY_ALIAS          key alias
#   ANDROID_KEY_PASSWORD       key password
# Without them the bundle is debug-signed (fine for size/validation, NOT for Play).

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

jobs:
  bundle:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/upload-keystore.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode upload keystore (if configured)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$ANDROID_KEYSTORE_FILE"
            echo "Upload keystore decoded — bundle will be release-signed."
          else
            rm -f "$ANDROID_KEYSTORE_FILE"
            echo "::warning::No KEYSTORE_BASE64 secret — bundle will be debug-signed (not uploadable to Play)."
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release bundle
        run: ./gradlew :app:bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: divine-canvas-release-aab
          path: app/build/outputs/bundle/release/*.aab
